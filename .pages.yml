media:
  input: media
  output: media

content:
  - name: components
    label: Components
    path: content/components
    type: collection
    format: json
    subfolders: true
    filename: '{fields.slug}.json'
    view:
      fields: [name, category]
    fields:
      - { name: name, label: Name, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: category, label: Category, type: string }
      - { name: description, label: Description, type: string }
      - { name: preview, label: Preview (image/url), type: string }
      - { name: code, label: Code, type: rich-text }
      - { name: props, label: Props, type: rich-text }

  - name: tokens
    label: Design Tokens
    path: content/tokens
    type: collection
    format: json
    filename: '{fields.name}.json'
    fields:
      - name: name
        type: string

      - name: tables
        type: object
        list: true
        fields:
          - name: name
            type: string

          - name: values
            type: object
            list: true
            fields:
              - name: name
                type: string
              - name: value
                type: string
              - name: description
                type: string